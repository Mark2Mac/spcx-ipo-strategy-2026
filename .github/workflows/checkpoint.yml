name: scheduled-checkpoint

on:
  schedule:
    # Mon & Thu 21:30 UTC (after US close). Self-sustaining: each commit counts as repo
    # activity, so GitHub never disables the schedule for inactivity.
    - cron: "30 21 * * 1,4"
  workflow_dispatch:
    inputs:
      label:
        description: "Milestone label (e.g. day1, options-listed, earnings-T)"
        required: false
        default: ""

permissions:
  contents: write

# Serialize runs: a schedule firing while a manual dispatch is mid-push would race two
# commits onto main and break the rebase/push. Never cancel an in-flight checkpoint.
concurrency:
  group: scheduled-checkpoint
  cancel-in-progress: false

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run checkpoint
        run: |
          LABEL="${{ github.event.inputs.label }}"
          if [ -n "$LABEL" ]; then
            python tools/checkpoint.py "$LABEL"
          else
            python tools/checkpoint.py auto
          fi

      - name: Score elapsed predictions
        run: python tools/score.py

      - name: Commit and push snapshot
        run: |
          git config user.name "checkpoint-bot"
          git config user.email "checkpoint-bot@users.noreply.github.com"
          git add checkpoints/
          git diff --cached --quiet && { echo "nothing new"; exit 0; }
          git commit -m "checkpoint: automated snapshot $(date -u +%F)"
          # INDEX.md is appended on both sides; -X union avoids a line-level rebase conflict.
          # Retry to absorb a push that loses the race against a concurrent run.
          for attempt in 1 2 3; do
            git pull --rebase -X union origin main && git push && exit 0
            echo "push attempt $attempt failed, retrying"; sleep 5
          done
          echo "push failed after retries"; exit 1
